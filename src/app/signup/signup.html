<mat-card class="small-card">
    <mat-card-header>
        <h1>Registracija</h1>
    </mat-card-header>
    <mat-card-content>
        <div>
            <mat-form-field class="full-width">
                <mat-label>Ime</mat-label>
                <input matInput type="text" [(ngModel)]="user.firstName">
            </mat-form-field>
            <mat-form-field class="full-width">
                <mat-label>Prezime</mat-label>
                <input matInput type="text" [(ngModel)]="user.lastName">
            </mat-form-field>
            <mat-form-field class="full-width">
                <mat-label>Broj telefona</mat-label>
                <input matInput type="text" [(ngModel)]="user.phone">
            </mat-form-field>
            <mat-form-field class="full-width">
                <mat-label>Adresa</mat-label>
                <input matInput type="text" [(ngModel)]="user.address">
            </mat-form-field>
            <mat-form-field class="full-width">
                <mat-label>Email</mat-label>
                <input matInput type="email" [(ngModel)]="user.email" id="email">
            </mat-form-field>
            <mat-form-field class="full-width">
                <mat-label>Lozinka</mat-label>
                <input matInput type="password" [(ngModel)]="user.password" id="password">
            </mat-form-field>
            <mat-form-field class="full-width">
                <mat-label>Ponovi lozinku</mat-label>
                <input matInput type="password" [(ngModel)]="repeat">
            </mat-form-field>
            <div class="favorite-types-section">
                <h3>Omiljene vrste igračaka (opciono)</h3>
                <div class="types-chips">
                    @for(type of availableToyTypes; track type) {
                        <mat-chip [class.selected-chip]="isSelected(type)" (click)="toggleFavoriteType(type)">
                            {{type}}
                        </mat-chip>
                    }
                </div>
            </div>
        </div>
    </mat-card-content>
    <mat-card-actions>
        <button type="button" mat-raised-button color="primary" (click)="doSignup()">
            <mat-icon fontIcon="send" /> Registruj se
        </button>
        <a routerLink="/login" mat-button>
            <mat-icon fontIcon="login" /> Već imaš nalog?
        </a>
    </mat-card-actions>
</mat-card>
