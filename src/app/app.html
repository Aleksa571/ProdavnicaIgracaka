<mat-toolbar color="primary">
  <div class="nav-left">
    <a routerLink="/" class="nav-link" routerLinkActive="active">
      <mat-icon fontIcon="home" /> <span>POČETNA</span>
    </a>
    <a routerLink="/about" class="nav-link" routerLinkActive="active">
      <mat-icon fontIcon="info" /> <span>O NAMA</span>
    </a>
  </div>
  <div class="nav-center">
    <h1 class="brand-title">Prodavnica Igracaka</h1>
  </div>
  <div class="nav-right">
    @if(authService.getActiveUser()) {
    <a routerLink="/korpa" class="nav-link" routerLinkActive="active">
      <mat-icon fontIcon="shopping_cart" /> <span>KORPA</span>
    </a>
    <a routerLink="/profil" class="nav-link" routerLinkActive="active">
      <mat-icon fontIcon="person" /> <span>{{userDisplayName()}}</span>
    </a>
    <button class="nav-link logout-btn" (click)="doLogout()">
      <mat-icon fontIcon="logout" /> <span>ODJAVI SE</span>
    </button>
    } @else {
    <a routerLink="/login" class="nav-link" routerLinkActive="active">
      <mat-icon fontIcon="login" /> <span>PRIJAVA</span>
    </a>
    }
  </div>
</mat-toolbar>
<div class="wrapper">
  <router-outlet />
</div>
