<mat-toolbar color="primary">
  <!-- Desktop Navigation -->
  <div class="nav-left desktop-nav">
    <a routerLink="/" matButton>
      <mat-icon fontIcon="home" /> Početna
    </a>
    <a routerLink="/about" matButton>
      <mat-icon fontIcon="info" /> O nama
    </a>
  </div>
  
  <div class="nav-center desktop-nav">
    <h1 class="brand-title">Prodavnica Igracaka</h1>
  </div>
  
  <div class="nav-right desktop-nav">
    @if(authService.getActiveUser()) {
    <a routerLink="/korpa" matButton>
      <mat-icon fontIcon="shopping_cart" /> Korpa
    </a>
    <a routerLink="/profil" matButton>
      <mat-icon fontIcon="person" /> {{getActiveUserName()}}
    </a>
    <button matButton (click)="doLogout()">
      <mat-icon fontIcon="logout" /> Odjavi se
    </button>
    } @else {
    <a routerLink="/login" matButton>
      <mat-icon fontIcon="login" /> Prijava
    </a>
    }
  </div>

  <!-- Mobile Navigation -->
  <div class="mobile-nav">
    <div class="mobile-nav-title">
      <h1 class="brand-title-mobile">Prodavnica Igracaka</h1>
    </div>
    <button matIconButton [matMenuTriggerFor]="menu">
      <mat-icon>more_vert</mat-icon>
    </button>
    <mat-menu #menu="matMenu">
      <a routerLink="/" mat-menu-item>
        <mat-icon fontIcon="home" /> Početna
      </a>
      <a routerLink="/about" mat-menu-item>
        <mat-icon fontIcon="info" /> O nama
      </a>
      @if(authService.getActiveUser()) {
      <a routerLink="/korpa" mat-menu-item>
        <mat-icon fontIcon="shopping_cart" /> Korpa
      </a>
      <a routerLink="/profil" mat-menu-item>
        <mat-icon fontIcon="person" /> {{getActiveUserName()}}
      </a>
      <button mat-menu-item (click)="doLogout()">
        <mat-icon fontIcon="logout" /> Odjavi se
      </button>
      } @else {
      <a routerLink="/login" mat-menu-item>
        <mat-icon fontIcon="login" /> Prijava
      </a>
      }
    </mat-menu>
  </div>
</mat-toolbar>
<div class="wrapper">
  <router-outlet />
</div>
